name: CI pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Lint code
        run: |
          flake8 src/ --max-line-length=100

      - name: Run feature pipeline
        run: |
          python src/pipeline.py

      - name: Check outputs exist
        run: |
          test -f outputs/features_2024-06-30.parquet
          test -f outputs/features_2024-12-31.parquet